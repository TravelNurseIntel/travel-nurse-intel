<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Nurse Market Intelligence</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">

<div id="header"></div>
<script src="/components/load-header.js"></script>

<div class="max-w-6xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6 text-center">
Travel Nurse Market Intelligence
</h1>

<!-- SHORTAGE INDEX -->

<h2 class="text-xl font-bold mb-4">
Regional Shortage Index
</h2>

<table class="w-full border text-sm mb-10">

<thead class="bg-gray-100">
<tr>
<th class="p-2">City</th>
<th class="p-2">Specialty</th>
<th class="p-2">Shortage Index</th>
</tr>
</thead>

<tbody id="shortageTable"></tbody>

</table>

<!-- FILL SPEED -->

<h2 class="text-xl font-bold mb-4">
Average Contract Fill Speed
</h2>

<table class="w-full border text-sm mb-10">

<thead class="bg-gray-100">
<tr>
<th class="p-2">Specialty</th>
<th class="p-2">Average Fill Days</th>
</tr>
</thead>

<tbody id="fillTable"></tbody>

</table>

<!-- PAY COMPETITIVENESS -->

<h2 class="text-xl font-bold mb-4">
Average Pay by Market
</h2>

<table class="w-full border text-sm">

<thead class="bg-gray-100">
<tr>
<th class="p-2">City</th>
<th class="p-2">Specialty</th>
<th class="p-2">Average Weekly Pay</th>
</tr>
</thead>

<tbody id="payTable"></tbody>

</table>

<!-- FORECAST -->

<h2 class="text-2xl font-bold mt-10 mb-4">
AI Pay Forecast
</h2>

<table class="w-full border">

<thead class="bg-gray-100">
<tr>
<th class="p-2">City</th>
<th class="p-2">Specialty</th>
<th class="p-2">Forecast Pay</th>
</tr>
</thead>

<tbody id="forecastTable"></tbody>

</table>

</div>

<div id="footer"></div>
<script src="/components/load-footer.js"></script>

<script>

async function fetchData(url){

try{

const res = await fetch(url)

if(!res.ok) throw new Error("API error")

return await res.json()

}catch(err){

console.error("Fetch failed:", url)

return []

}

}

/* SHORTAGE */

async function loadShortage(){

const data = await fetchData("/api/market?type=shortage")

const table = document.getElementById("shortageTable")

table.innerHTML = ""

data.forEach(row=>{

table.innerHTML += `
<tr class="border-b">
<td class="p-2">${row.city || "-"}</td>
<td class="p-2">${row.specialty || "-"}</td>
<td class="p-2">${row.shortageIndex ?? row.shortageindex ?? "-"}</td>
</tr>
`

})

}

/* FILL SPEED */

async function loadFillSpeed(){

const data = await fetchData("/api/market?type=fill")

const table = document.getElementById("fillTable")

table.innerHTML = ""

data.forEach(row=>{

table.innerHTML += `
<tr class="border-b">
<td class="p-2">${row.specialty || "-"}</td>
<td class="p-2">${row.avgFillDays ?? row.avgfilldays ?? "-"}</td>
</tr>
`

})

}

/* PAY */

async function loadPay(){

const data = await fetchData("/api/market?type=pay")

const table = document.getElementById("payTable")

table.innerHTML = ""

data.forEach(row=>{

table.innerHTML += `
<tr class="border-b">
<td class="p-2">${row.city || "-"}</td>
<td class="p-2">${row.specialty || "-"}</td>
<td class="p-2">$${row.averagePay ?? row.averagepay ?? 0}</td>
</tr>
`

})

}

/* FORECAST */

async function loadForecast(){

const data = await fetchData("/api/market?type=forecast")

const table = document.getElementById("forecastTable")

table.innerHTML = ""

data.forEach(row => {

table.innerHTML += `
<tr class="border-b">
<td class="p-2">${row.city || "-"}</td>
<td class="p-2">${row.specialty || "-"}</td>
<td class="p-2">$${row.forecast ?? "-"}</td>
</tr>
`

})

}

/* LOAD ALL */

loadShortage()
loadFillSpeed()
loadPay()
loadForecast()

</script>

</body>
</html>
