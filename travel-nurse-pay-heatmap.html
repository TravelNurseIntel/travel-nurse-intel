<div id="map" style="height:600px"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo"></script>

<script>

const data = [
{state:"CA", value:3600},
{state:"WA", value:3400},
{state:"TX", value:3000},
{state:"FL", value:2800}
]

const ctx = document.getElementById('map')

new Chart(ctx, {

type: 'choropleth',

data: {
labels: data.map(d => d.state),
datasets: [{
label: 'Weekly Travel Nurse Pay',
data: data.map(d => ({feature: d.state, value: d.value}))
}]
}

})

</script>
