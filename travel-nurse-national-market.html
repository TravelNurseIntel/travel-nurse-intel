<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>National Travel Nurse Market Data</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">

<div id="header"></div>
<script src="/components/load-header.js"></script>

<main class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow mt-6">

<h1 class="text-3xl font-bold mb-6 text-center">

National Travel Nurse Market Data

</h1>

<table class="w-full border text-sm">

<thead class="bg-gray-100">

<tr>
<th class="p-2">City</th>
<th class="p-2">Specialty</th>
<th class="p-2">Contracts</th>
<th class="p-2">Average Pay</th>
</tr>

</thead>

<tbody id="marketTable"></tbody>

</table>

</main>

<div id="footer"></div>
<script src="/components/load-footer.js"></script>

<script>

async function loadMarket(){

const res = await fetch("/api/national-market-stats")

const data = await res.json()

const table = document.getElementById("marketTable")

data.forEach(row => {

table.innerHTML += `

<tr class="border-b">

<td class="p-2">${row.city}</td>
<td class="p-2">${row.specialty}</td>
<td class="p-2">${row.contracts}</td>
<td class="p-2">$${row.avgPay}</td>

</tr>

`

})

}

loadMarket()

</script>

</body>
</html>
