<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Nurse Demand Heatmap</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">

<div id="header"></div>
<script src="/components/load-header.js"></script>

<main class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow mt-6">

<h1 class="text-3xl font-bold mb-6 text-center">
Travel Nurse Demand Heatmap
</h1>

<table class="w-full border text-sm">

<thead class="bg-gray-100">

<tr>
<th class="p-2">City</th>
<th class="p-2">Specialty</th>
<th class="p-2">Shortage Score</th>
<th class="p-2">Prediction</th>
</tr>

</thead>

<tbody id="heatmapTable"></tbody>

</table>

</main>

<div id="footer"></div>
<script src="/components/load-footer.js"></script>

<script>

async function loadHeatmap(){

const res = await fetch("/api/shortage-predict")
const data = await res.json()

const table = document.getElementById("heatmapTable")

data.forEach(row => {

let color = "text-green-600"

if(row.shortageScore > 3) color = "text-red-600"
else if(row.shortageScore > 2) color = "text-yellow-600"

table.innerHTML += `

<tr class="border-b">

<td class="p-2">${row.city}</td>
<td class="p-2">${row.specialty}</td>
<td class="p-2 ${color} font-semibold">${row.shortageScore}</td>
<td class="p-2">${row.prediction}</td>

</tr>

`

})

}

loadHeatmap()

</script>

</body>
</html>
